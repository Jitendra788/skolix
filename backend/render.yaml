# Prefer repo-root render.yaml for Blueprints.
# Kept for reference when deploying backend folder alone.
services:
  - type: web
    name: skolix-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: SKOLIX_ADMIN_USER
        value: admin
      - key: SKOLIX_ADMIN_PASS
        value: admin123
      - key: CORS_ORIGINS
        value: https://skolix-navy.vercel.app
      - key: SKOLIX_DB_PATH
        value: /tmp/dungrana_school.db
